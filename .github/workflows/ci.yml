name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm run verify:pins
      - run: npm run verify:shafts
      # Guards Copy/Paste id remapping + mate scoping and the Brain Gen 2
      # asset. Runs on Linux, so it also catches filename-casing regressions
      # that a case-insensitive Windows checkout would hide before they reach
      # GitHub Pages.
      - run: npm run verify:copy-paste
